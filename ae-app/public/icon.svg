<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#1b2a4a"/>
  <!-- A-shape with two crossbars (instead of the single classic bar) so the
       glyph evokes a $ symbol: the diagonals read as the S-curve of the $,
       the two horizontal bars read as the two short crossing strokes. -->
  <path d="M256 96 L80 416 M256 96 L432 416 M186 224 L326 224 M116 352 L396 352"
        stroke="#0d9488" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
